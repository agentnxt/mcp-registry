version: '3.8'

services:
  mcpservers:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcpservers
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./config:/app/config
      - ./data:/app/data
    restart: unless-stopped
    networks:
      - mcp-network

  # Individual MCP servers can be run as separate services
  filesystem-mcp:
    image: modelcontextprotocol/filesystem-server
    container_name: filesystem-mcp
    ports:
      - "3100:3100"
    volumes:
      - ./shared-files:/data
    restart: unless-stopped
    networks:
      - mcp-network

  github-mcp:
    image: modelcontextprotocol/github-server
    container_name: github-mcp
    ports:
      - "3101:3101"
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    restart: unless-stopped
    networks:
      - mcp-network

  slack-mcp:
    image: modelcontextprotocol/slack-server
    container_name: slack-mcp
    ports:
      - "3102:3102"
    environment:
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_TEAM_ID=${SLACK_TEAM_ID}
    restart: unless-stopped
    networks:
      - mcp-network

networks:
  mcp-network:
    driver: bridge